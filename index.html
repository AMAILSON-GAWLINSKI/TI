<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Login · Ótica Grau Divino</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    .login-card {
      background: #ffffff;
      border-radius: 48px;
      padding: 40px 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(252, 84, 4, 0.1);
      transition: transform 0.2s ease;
    }

    .login-card:hover {
      transform: translateY(-2px);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-image {
      width: 100px;
      height: 100px;
      object-fit: contain;
      margin-bottom: 20px;
      border-radius: 28px;
      background: transparent;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.1));
      transition: transform 0.3s ease;
    }

    .logo-image:hover {
      transform: scale(1.02);
    }

    .subtitle {
      color: #6b7280;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .input-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #2f3547;
    }

    .input-with-icon {
      position: relative;
    }

    .input-with-icon i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      font-size: 1.1rem;
    }

    input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      border: 1.5px solid #e2e6ee;
      border-radius: 24px;
      background: #fafbfc;
      transition: all 0.2s;
      outline: none;
      color: #1e1f2a;
      font-weight: 500;
    }

    input:focus {
      border-color: #fc5404;
      background: white;
      box-shadow: 0 0 0 3px rgba(252, 84, 4, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px 24px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      background: #fc5404;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-login:hover {
      background: #e04a02;
      transform: scale(1.02);
      box-shadow: 0 8px 20px rgba(252, 84, 4, 0.3);
    }

    .alert-error {
      background: #fee2e2;
      border-left: 4px solid #e74c3c;
      padding: 12px 16px;
      border-radius: 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: #c0392b;
      font-weight: 500;
    }

    .alert-error i {
      font-size: 1.2rem;
    }

    .user-session {
      background: #f0fdf4;
      border-radius: 20px;
      padding: 12px 16px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid #bbf7d0;
    }

    .user-session-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-session-info i {
      font-size: 1.5rem;
      color: #22c55e;
    }

    .user-session-info span {
      font-weight: 600;
      color: #166534;
    }

    .btn-logout-session {
      background: none;
      border: none;
      color: #e74c3c;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 6px 12px;
      border-radius: 30px;
      transition: all 0.2s;
    }

    .btn-logout-session:hover {
      background: #fee2e2;
    }

    .btn-continue {
      width: 100%;
      padding: 14px 24px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      cursor: pointer;
      background: #22c55e;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s;
      margin-top: 12px;
    }

    .btn-continue:hover {
      background: #16a34a;
      transform: scale(1.02);
    }
    
    .logout-area {
      margin-top: 20px;
      text-align: center;
      border-top: 1px solid #edeef3;
      padding-top: 20px;
    }

    .btn-logout {
      background: transparent;
      border: 1.5px solid #e2e6ee;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      color: #5f647e;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      background: #fee2e2;
      border-color: #e74c3c;
      color: #e74c3c;
    }

    .sync-status {
      font-size: 0.7rem;
      text-align: center;
      margin-top: 16px;
      color: #94a3b8;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .shake-animation {
      animation: shake 0.3s ease-in-out;
    }
  </style>
</head>
<body>
<div class="login-container">
  <div class="login-card" id="loginCard">
    <div class="logo-area">
      <img src="https://raw.githubusercontent.com/AMAILSON-GAWLINSKI/ORCAMENTO/refs/heads/main/LOGO%20SEM%20FUNDO.png" 
           alt="Ótica Grau Divino Logo" 
           class="logo-image"
           onerror="this.onerror=null; this.style.display='none'; document.getElementById('fallbackIcon').style.display='inline-flex';">
      <div id="fallbackIcon" style="display: none; font-size: 3rem; color: #fc5404;">
        <i class="fas fa-glasses"></i>
      </div>
      <div class="subtitle">Acesse o sistema de orçamentos</div>
    </div>

    <div id="activeSessionDiv" style="display: none;" class="user-session">
      <div class="user-session-info">
        <i class="fas fa-user-check"></i>
        <span id="activeUserName">---</span>
      </div>
      <button id="logoutFromSessionBtn" class="btn-logout-session" title="Sair e trocar de atendente">
        <i class="fas fa-sign-out-alt"></i> Sair
      </button>
    </div>

    <div id="loginFormDiv">
      <div id="errorMessage" style="display: none;" class="alert-error">
        <i class="fas fa-exclamation-triangle"></i>
        <span id="errorText">Usuário ou senha incorretos!</span>
      </div>

      <div class="input-group">
        <label><i class="fas fa-user"></i> Login</label>
        <div class="input-with-icon">
          <i class="fas fa-user-circle"></i>
          <input type="text" id="loginUser" placeholder="Digite seu login" autocomplete="off">
        </div>
      </div>

      <div class="input-group">
        <label><i class="fas fa-lock"></i> Senha</label>
        <div class="input-with-icon">
          <i class="fas fa-key"></i>
          <input type="password" id="loginPassword" placeholder="Digite sua senha">
        </div>
      </div>

      <button class="btn-login" id="loginBtn">
        <i class="fas fa-arrow-right-to-bracket"></i> Entrar no Sistema
      </button>
    </div>

    <div class="logout-area" id="logoutArea" style="display: none;">
      <button id="logoutBtn" class="btn-logout">
        <i class="fas fa-sign-out-alt"></i> Sair / Trocar de Atendente
      </button>
    </div>
    
    <div class="sync-status" id="syncStatus">
      <i class="fas fa-sync-alt"></i> Carregando atendentes...
    </div>
  </div>
</div>

<script>
  // ==================== ATENDENTES PADRÃO ====================
  const DEFAULT_ATENDENTES = [
    { id: 1, nome: "Jaúna Constante", login: "jauna", senha: "176320", email: "jauna@oticagraudivino.com", ativo: true, criado_em: new Date().toISOString() },
    { id: 2, nome: "Jaciara Constante", login: "jaciara", senha: "176320", email: "jaciara@oticagraudivino.com", ativo: true, criado_em: new Date().toISOString() },
    { id: 3, nome: "Luana Paloschi", login: "luana", senha: "luana456", email: "luana@oticagraudivino.com", ativo: true, criado_em: new Date().toISOString() },
    { id: 4, nome: "Aline", login: "aline", senha: "aline789", email: "aline@oticagraudivino.com", ativo: true, criado_em: new Date().toISOString() },
    { id: 5, nome: "Amailson Gawlinski", login: "amailson", senha: "amailson123", email: "amailson@oticagraudivino.com", ativo: true, criado_em: new Date().toISOString() }
  ];

  let atendentes = [];

  // Função para carregar atendentes do localStorage
  function carregarAtendentes() {
    const saved = localStorage.getItem('atendentes');
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length > 0) {
          atendentes = parsed;
          console.log('Atendentes carregados do localStorage:', atendentes.length);
          document.getElementById('syncStatus').innerHTML = '<i class="fas fa-check-circle"></i> Atendentes sincronizados com o sistema';
          setTimeout(() => {
            const statusDiv = document.getElementById('syncStatus');
            if (statusDiv) statusDiv.style.opacity = '0.5';
          }, 3000);
          return;
        }
      } catch(e) {
        console.error('Erro ao parser atendentes:', e);
      }
    }
    
    // Se não houver dados, usar padrão
    atendentes = JSON.parse(JSON.stringify(DEFAULT_ATENDENTES));
    localStorage.setItem('atendentes', JSON.stringify(atendentes));
    document.getElementById('syncStatus').innerHTML = '<i class="fas fa-info-circle"></i> Configuração inicial carregada';
  }

  // Função para validar login
  function validarLogin(login, senha) {
    console.log('Tentando login:', login);
    console.log('Atendentes disponíveis:', atendentes.map(a => ({ login: a.login, nome: a.nome, ativo: a.ativo })));
    
    const userFound = atendentes.find(atendente => 
      atendente.ativo === true && 
      atendente.login && 
      atendente.login.toLowerCase() === login.toLowerCase() && 
      atendente.senha === senha
    );
    
    if (userFound) {
      console.log('Usuário encontrado:', userFound.nome);
      return {
        nomeExibicao: userFound.nome,
        login: userFound.login,
        isAdmin: userFound.nome === 'Jaúna Constante' || userFound.nome === 'Jaciara Constante',
        id: userFound.id
      };
    }
    console.log('Usuário não encontrado ou credenciais inválidas');
    return null;
  }

  function showError(message) {
    const errorDiv = document.getElementById('errorMessage');
    const errorText = document.getElementById('errorText');
    errorText.textContent = message || 'Usuário ou senha incorretos!';
    errorDiv.style.display = 'flex';
    
    const card = document.querySelector('.login-card');
    card.classList.add('shake-animation');
    setTimeout(() => {
      card.classList.remove('shake-animation');
    }, 300);
    
    setTimeout(() => {
      errorDiv.style.display = 'none';
    }, 3000);
  }

  function clearError() {
    const errorDiv = document.getElementById('errorMessage');
    if (errorDiv) errorDiv.style.display = 'none';
  }

  function removeContinueButton() {
    const continueBtn = document.getElementById('goToOrcamentoBtn');
    if (continueBtn && continueBtn.parentNode) {
      continueBtn.parentNode.removeChild(continueBtn);
    }
  }

  function updateUIBasedOnSession() {
    const usuarioSalvo = localStorage.getItem('usuarioLogado');
    const activeSessionDiv = document.getElementById('activeSessionDiv');
    const loginFormDiv = document.getElementById('loginFormDiv');
    const logoutArea = document.getElementById('logoutArea');
    
    removeContinueButton();
    
    if (usuarioSalvo) {
      try {
        const user = JSON.parse(usuarioSalvo);
        const timestamp = new Date(user.loginTimestamp);
        const agora = new Date();
        const diffHoras = (agora - timestamp) / (1000 * 60 * 60);
        
        if (diffHoras > 8) {
          localStorage.removeItem('usuarioLogado');
          sessionStorage.removeItem('auth');
          updateUIBasedOnSession();
          return;
        }
        
        if (activeSessionDiv) activeSessionDiv.style.display = 'flex';
        if (loginFormDiv) loginFormDiv.style.display = 'none';
        if (logoutArea) logoutArea.style.display = 'block';
        
        const activeUserName = document.getElementById('activeUserName');
        if (activeUserName) activeUserName.textContent = user.nome;
        
        const loginCard = document.getElementById('loginCard');
        if (loginCard && !document.getElementById('goToOrcamentoBtn')) {
          const continueButton = document.createElement('button');
          continueButton.id = 'goToOrcamentoBtn';
          continueButton.className = 'btn-continue';
          continueButton.innerHTML = '<i class="fas fa-arrow-right"></i> Continuar no Sistema de Orçamentos';
          continueButton.onclick = () => {
            window.location.href = 'orcamento.html';
          };
          
          if (logoutArea && logoutArea.parentNode) {
            logoutArea.parentNode.insertBefore(continueButton, logoutArea.nextSibling);
          } else if (loginCard) {
            loginCard.appendChild(continueButton);
          }
        }
        
      } catch(e) {
        console.error('Erro ao ler sessão', e);
        localStorage.removeItem('usuarioLogado');
        sessionStorage.removeItem('auth');
        if (activeSessionDiv) activeSessionDiv.style.display = 'none';
        if (loginFormDiv) loginFormDiv.style.display = 'block';
        if (logoutArea) logoutArea.style.display = 'none';
        removeContinueButton();
      }
    } else {
      if (activeSessionDiv) activeSessionDiv.style.display = 'none';
      if (loginFormDiv) loginFormDiv.style.display = 'block';
      if (logoutArea) logoutArea.style.display = 'none';
      removeContinueButton();
      
      const userInput = document.getElementById('loginUser');
      const passInput = document.getElementById('loginPassword');
      if (userInput) userInput.value = '';
      if (passInput) passInput.value = '';
    }
  }

  function logout() {
    localStorage.removeItem('usuarioLogado');
    sessionStorage.removeItem('auth');
    localStorage.removeItem('orcamentosTemp');
    localStorage.removeItem('nextIdTemp');
    
    const userInput = document.getElementById('loginUser');
    const passInput = document.getElementById('loginPassword');
    if (userInput) userInput.value = '';
    if (passInput) passInput.value = '';
    
    removeContinueButton();
    updateUIBasedOnSession();
    
    const errorDiv = document.getElementById('errorMessage');
    if (errorDiv) errorDiv.style.display = 'none';
    
    const card = document.querySelector('.login-card');
    const originalBorder = card.style.border;
    card.style.border = '2px solid #25d366';
    setTimeout(() => {
      card.style.border = originalBorder;
    }, 500);
  }

  function handleLogin() {
    const loginInput = document.getElementById('loginUser');
    const passwordInput = document.getElementById('loginPassword');
    
    const login = loginInput.value.trim().toLowerCase();
    const password = passwordInput.value.trim();
    
    if (login === '' || password === '') {
      showError('Por favor, preencha ambos os campos!');
      return;
    }
    
    const user = validarLogin(login, password);
    
    if (!user) {
      showError('❌ Login ou senha incorretos! Tente novamente.');
      passwordInput.value = '';
      passwordInput.focus();
      return;
    }
    
    localStorage.setItem('usuarioLogado', JSON.stringify({
      nome: user.nomeExibicao,
      login: user.login,
      isAdmin: user.isAdmin,
      loginTimestamp: new Date().toISOString()
    }));
    sessionStorage.setItem('auth', 'true');
    
    updateUIBasedOnSession();
    
    // Redirecionar diretamente para o orcamento.html
    window.location.href = 'orcamento.html';
  }

  // Escutar mudanças no localStorage
  function escutarMudancasAtendentes() {
    window.addEventListener('storage', function(event) {
      if (event.key === 'atendentes') {
        console.log('Atendentes atualizados em outra aba/janela');
        carregarAtendentes();
        const usuarioSalvo = localStorage.getItem('usuarioLogado');
        if (usuarioSalvo) {
          try {
            const user = JSON.parse(usuarioSalvo);
            const aindaExiste = atendentes.some(a => a.ativo === true && a.nome === user.nome);
            if (!aindaExiste) {
              logout();
              alert('⚠️ Seu usuário foi desativado ou removido. Faça login novamente.');
            }
          } catch(e) {}
        }
      }
    });
  }

  // Inicialização
  function init() {
    carregarAtendentes();
    escutarMudancasAtendentes();
    updateUIBasedOnSession();
    
    const logoImg = document.querySelector('.logo-image');
    if (logoImg) {
      logoImg.addEventListener('error', function() {
        this.style.display = 'none';
        const fallback = document.getElementById('fallbackIcon');
        if (fallback) fallback.style.display = 'inline-flex';
      });
    }
  }

  const loginBtn = document.getElementById('loginBtn');
  const passwordField = document.getElementById('loginPassword');
  const userField = document.getElementById('loginUser');
  const logoutBtn = document.getElementById('logoutBtn');
  const logoutFromSessionBtn = document.getElementById('logoutFromSessionBtn');
  
  if (loginBtn) loginBtn.addEventListener('click', handleLogin);
  if (logoutBtn) logoutBtn.addEventListener('click', logout);
  if (logoutFromSessionBtn) logoutFromSessionBtn.addEventListener('click', logout);
  
  if (passwordField) {
    passwordField.addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        handleLogin();
      }
    });
  }
  
  if (userField) {
    userField.addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        if (passwordField) passwordField.focus();
      }
    });
    userField.addEventListener('input', clearError);
  }
  
  if (passwordField) {
    passwordField.addEventListener('input', clearError);
  }
  
  init();
</script>
</body>
</html>
